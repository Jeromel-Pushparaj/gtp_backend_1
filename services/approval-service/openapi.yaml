openapi: 3.0.3
info:
  title: Approval Service API
  description: |
    API for managing approval workflows through Slack integration with Kafka-based event-driven architecture.
    This service provides comprehensive approval request management with interactive Slack messages and real-time event tracking.

    Event-Driven Flow:
    - Only 2 endpoints follow the complete Kafka event-driven flow
    - All other endpoints are direct synchronous operations
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:8083
    description: Local development server
  - url: https://api.example.com
    description: Production server

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string
          description: Error message

    User:
      type: object
      properties:
        id:
          type: string
          description: Slack user ID
        name:
          type: string
          description: Slack username
        real_name:
          type: string
          description: User's real name
        email:
          type: string
          description: User's email address

    Channel:
      type: object
      properties:
        id:
          type: string
          description: Slack channel ID
        name:
          type: string
          description: Channel name
        is_private:
          type: boolean
          description: Whether the channel is private
        is_member:
          type: boolean
          description: Whether the bot is a member

    AppInfo:
      type: object
      properties:
        id:
          type: string
          description: App/Bot user ID
        name:
          type: string
          description: App username
        is_bot:
          type: boolean
          description: Whether this is a bot
        real_name:
          type: string
          description: App display name

    CreateChannelRequest:
      type: object
      required:
        - channel_name
      properties:
        channel_name:
          type: string
          description: Name of the channel to create
        is_private:
          type: boolean
          description: Whether to create a private channel
          default: false
        description:
          type: string
          description: Channel description/topic

    CreateChannelResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        channel_id:
          type: string
        channel_name:
          type: string

    GetUserRequest:
      type: object
      properties:
        user_name:
          type: string
          description: Slack username (for by-name lookup)
        user_id:
          type: string
          description: Slack user ID (for by-id lookup)

    GetUserResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        user:
          $ref: "#/components/schemas/User"

    GetAllUsersResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        users:
          type: array
          items:
            $ref: "#/components/schemas/User"
        count:
          type: integer

    GetChannelRequest:
      type: object
      properties:
        channel_name:
          type: string
          description: Channel name (for by-name lookup)
        channel_id:
          type: string
          description: Channel ID (for by-id lookup)

    GetChannelResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        channel:
          $ref: "#/components/schemas/Channel"

    GetAllChannelsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        channels:
          type: array
          items:
            $ref: "#/components/schemas/Channel"
        count:
          type: integer

    AddMemberRequest:
      type: object
      properties:
        channel_id:
          type: string
          description: Channel ID (use either channel_id or channel_name)
        channel_name:
          type: string
          description: Channel name (use either channel_id or channel_name)
        user_id:
          type: string
          description: User ID (use either user_id or user_name)
        user_name:
          type: string
          description: Username (use either user_id or user_name)

    AddMemberResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        channel_id:
          type: string
        channel_name:
          type: string
        user_id:
          type: string
        user_name:
          type: string

    Mention:
      type: object
      properties:
        type:
          type: string
          enum:
            [
              user,
              user_by_name,
              channel_link,
              channel_by_name,
              here,
              channel,
              everyone,
              usergroup,
            ]
          description: Type of mention
        id:
          type: string
          description: ID of the user/channel/usergroup (for ID-based mentions)
        name:
          type: string
          description: Name of the user/channel (for name-based mentions)

    SendMessageRequest:
      type: object
      required:
        - text
      properties:
        channel_id:
          type: string
          description: Channel ID (use either channel_id or channel_name)
        channel_name:
          type: string
          description: Channel name (use either channel_id or channel_name)
        text:
          type: string
          description: Message text
        mentions:
          type: array
          items:
            $ref: "#/components/schemas/Mention"
          description: List of mentions to include in the message
        thread_ts:
          type: string
          description: Thread timestamp for threaded replies

    SendMessageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        channel_id:
          type: string
        timestamp:
          type: string
          description: Message timestamp (for threading)
        text:
          type: string

    GetDMChannelRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          description: Slack user ID to open DM with

    GetDMChannelResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        channel_id:
          type: string
          description: DM channel ID

    GetAppsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        apps:
          type: array
          items:
            $ref: "#/components/schemas/AppInfo"
        count:
          type: integer

    DomainChangeApprovalRequest:
      type: object
      required:
        - old_domain_name
        - new_domain_name
        - change_reason
      properties:
        approver_id:
          type: string
          description: Approver's Slack user ID (use either approver_id or approver_name)
        approver_name:
          type: string
          description: Approver's name (use either approver_id or approver_name)
        requester_id:
          type: string
          description: Requester's Slack user ID (use either requester_id or requester_name)
        requester_name:
          type: string
          description: Requester's name (use either requester_id or requester_name)
        old_domain_name:
          type: string
          description: Current domain name
        new_domain_name:
          type: string
          description: New domain name
        change_reason:
          type: string
          description: Reason for the domain change
        additional_info:
          type: string
          description: Additional information about the change
        channel_id:
          type: string
          description: Channel ID to send approval message (if not using DM)
        channel_name:
          type: string
          description: Channel name to send approval message (if not using DM)
        use_app_dm:
          type: boolean
          description: Whether to send via app DM instead of channel
          default: false
        app_bot_user_id:
          type: string
          description: App bot user ID (required if use_app_dm is true)

    CreateApprovalRequest:
      type: object
      required:
        - channel_name
        - approver_name
        - requester_name
        - request_type
        - message
      properties:
        channel_name:
          type: string
          description: Channel name to send approval message
        approver_name:
          type: string
          description: Name of the approver
        requester_name:
          type: string
          description: Name of the requester
        request_type:
          type: string
          description: Type of approval request
        message:
          type: string
          description: Approval request message
        request_data:
          type: object
          additionalProperties: true
          description: Additional request data

    CreateApprovalResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        request_id:
          type: string
          description: Unique request identifier (UUID)

    GetApprovalByIDRequest:
      type: object
      required:
        - request_id
      properties:
        request_id:
          type: string
          description: Approval request ID (UUID)

    ApprovalRequest:
      type: object
      properties:
        request_id:
          type: string
          description: Unique request identifier (UUID)
        requester_id:
          type: string
          description: Slack user ID of requester
        requester_name:
          type: string
          description: Display name of requester
        approver_id:
          type: string
          description: Slack user ID of approver
        approver_name:
          type: string
          description: Display name of approver
        channel_id:
          type: string
          description: Slack channel/DM ID where message was sent
        message_ts:
          type: string
          description: Slack message timestamp
        request_type:
          type: string
          description: Type of approval request
        status:
          type: string
          enum: [pending, approved, rejected]
          description: Current status of the approval
        reason:
          type: string
          description: Reason for decision
        approver_comment:
          type: string
          description: Comment from approver
        created_at:
          type: string
          format: date-time
          description: Record creation timestamp
        updated_at:
          type: string
          format: date-time
          description: Record update timestamp

    GetApprovalResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: "#/components/schemas/ApprovalRequest"

    GetAllApprovalsResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalRequest"

paths:
  /health:
    get:
      summary: Health check endpoint
      description: Check if the API server is running
      tags:
        - Health
      responses:
        "200":
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: approval-service

  # Slack Channel Management
  /api/v1/slack/channel/create:
    post:
      summary: Create Slack channel
      description: Create a new Slack channel (public or private)
      tags:
        - Slack Channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChannelRequest"
      responses:
        "200":
          description: Channel created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateChannelResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/channels/all:
    get:
      summary: Get all Slack channels
      description: Retrieve all Slack channels accessible to the bot
      tags:
        - Slack Channels
      responses:
        "200":
          description: List of channels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllChannelsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/channel/by-name:
    post:
      summary: Get channel by name
      description: Get Slack channel information by channel name
      tags:
        - Slack Channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetChannelRequest"
      responses:
        "200":
          description: Channel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChannelResponse"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/channel/by-id:
    post:
      summary: Get channel by ID
      description: Get Slack channel information by channel ID
      tags:
        - Slack Channels
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetChannelRequest"
      responses:
        "200":
          description: Channel found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetChannelResponse"
        "404":
          description: Channel not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Slack User Management
  /api/v1/slack/users/all:
    get:
      summary: Get all Slack users
      description: Retrieve all Slack users in the workspace
      tags:
        - Slack Users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllUsersResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/user/by-name:
    post:
      summary: Get user by name
      description: Get Slack user information by username
      tags:
        - Slack Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetUserRequest"
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/user/by-id:
    post:
      summary: Get user by ID
      description: Get Slack user information by user ID
      tags:
        - Slack Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetUserRequest"
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetUserResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/apps/all:
    get:
      summary: Get all Slack apps
      description: Retrieve all Slack apps/bots in the workspace
      tags:
        - Slack Users
      responses:
        "200":
          description: List of apps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAppsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Slack Messaging
  /api/v1/slack/member/add:
    post:
      summary: Add member to channel
      description: Add a user to a Slack channel
      tags:
        - Slack Messaging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMemberRequest"
      responses:
        "200":
          description: Member added successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddMemberResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/message/send:
    post:
      summary: Send message to channel
      description: Send a message to a Slack channel with optional mentions and threading
      tags:
        - Slack Messaging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Message sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/dm-channel/get:
    post:
      summary: Get DM channel ID
      description: Open a DM channel with a user and get the channel ID
      tags:
        - Slack Messaging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetDMChannelRequest"
      responses:
        "200":
          description: DM channel opened successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetDMChannelResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/slack/approval-form-button/send:
    post:
      summary: Send approval form button to channel
      description: Send an interactive approval form with buttons to a Slack channel
      tags:
        - Slack Messaging
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                channel_id:
                  type: string
                  description: Channel ID to send the approval form
                message:
                  type: string
                  description: Message text for the approval form
      responses:
        "200":
          description: Approval form sent successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SendMessageResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # Approval Requests
  /api/v1/approval/all:
    get:
      summary: Get all approval requests
      description: Retrieve all approval requests from the database
      tags:
        - Approval Requests
      responses:
        "200":
          description: List of all approval requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllApprovalsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/approval/pending:
    get:
      summary: Get pending approval requests
      description: Retrieve all pending approval requests (status = pending)
      tags:
        - Approval Requests
      responses:
        "200":
          description: List of pending approval requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetAllApprovalsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/approval/by-id:
    post:
      summary: Get approval request by ID
      description: Retrieve a specific approval request by its ID
      tags:
        - Approval Requests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GetApprovalByIDRequest"
      responses:
        "200":
          description: Approval request found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GetApprovalResponse"
        "404":
          description: Approval request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/approval/request:
    post:
      summary: Create approval request (Kafka Event-Driven)
      description: |
        Create a generic approval request and publish to Kafka.

        This endpoint follows the complete Kafka event-driven flow:
        1. Publishes to approval.requested topic
        2. Kafka consumer processes and sends Slack message
        3. Human approves/rejects via Slack
        4. Publishes to approval.completed topic
        5. Business consumer publishes to action.executed/rejected topic
      tags:
        - Approval Requests (Event-Driven)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalRequest"
            example:
              channel_name: "approvals"
              approver_name: "Jane Smith"
              requester_name: "John Doe"
              request_type: "deployment"
              message: "Please approve production deployment"
              request_data:
                service: "api-gateway"
                version: "v2.1.0"
                environment: "production"
      responses:
        "200":
          description: Approval request created and published to Kafka
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApprovalResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/approval/domain-change:
    post:
      summary: Create domain change approval request (Kafka Event-Driven)
      description: |
        Create a domain change approval request and publish to Kafka.

        This endpoint follows the complete Kafka event-driven flow:
        1. Publishes to approval.requested topic
        2. Kafka consumer processes and sends Slack message
        3. Human approves/rejects via Slack
        4. Publishes to approval.completed topic
        5. Business consumer publishes to action.executed/rejected topic
      tags:
        - Approval Requests (Event-Driven)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DomainChangeApprovalRequest"
            examples:
              using_names:
                summary: Using user names
                value:
                  approver_name: "Jane Smith"
                  requester_name: "John Doe"
                  old_domain_name: "legacy-domain"
                  new_domain_name: "new-domain"
                  change_reason: "Rebranding initiative"
                  additional_info: "This affects production environment"
                  use_app_dm: true
                  app_bot_user_id: "U0APPBOT123"
              using_ids:
                summary: Using user IDs
                value:
                  approver_id: "U0123456789"
                  requester_id: "U9876543210"
                  old_domain_name: "legacy-domain"
                  new_domain_name: "new-domain"
                  change_reason: "Rebranding initiative"
                  additional_info: "This affects production environment"
                  use_app_dm: false
                  channel_name: "approvals"
      responses:
        "200":
          description: Domain change approval request created and published to Kafka
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateApprovalResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

tags:
  - name: Health
    description: Health check endpoints
  - name: Slack Channels
    description: Slack channel management operations (synchronous)
  - name: Slack Users
    description: Slack user and app management operations (synchronous)
  - name: Slack Messaging
    description: Slack messaging operations (synchronous)
  - name: Approval Requests
    description: Approval request query operations (synchronous)
  - name: Approval Requests (Event-Driven)
    description: |
      Approval request creation endpoints that follow the complete Kafka event-driven flow.
      These are the only 2 endpoints that use Kafka for asynchronous processing.
