# Auto-Regression Platform Configuration
# This is the default configuration file. Override with environment-specific configs.

server:
  host: 0.0.0.0
  port: 8096
  grpc_port: 9090
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s
  max_header_bytes: 1048576 # 1MB

database:
  host: localhost
  port: 5432
  name: auto_regression
  user: postgres
  password: ${DB_PASSWORD} # Set via environment variable
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m
  log_queries: false

redis:
  host: localhost
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0
  max_retries: 3
  pool_size: 10
  min_idle_conns: 5

queue:
  provider: redis_streams # Options: redis_streams, nats
  redis:
    stream_name: auto_regression_jobs
    consumer_group: workers
    max_len: 10000
  nats:
    url: nats://localhost:4222
    stream_name: AUTO_REGRESSION_JOBS

storage:
  artifacts:
    provider: s3 # Options: s3, gcs, local
    s3:
      bucket: auto-regression-artifacts
      region: us-east-1
      endpoint: ${S3_ENDPOINT} # Optional for MinIO
      access_key: ${AWS_ACCESS_KEY_ID}
      secret_key: ${AWS_SECRET_ACCESS_KEY}
    gcs:
      bucket: auto-regression-artifacts
      credentials_file: ${GCS_CREDENTIALS_FILE}
    local:
      base_path: ./artifacts

llm:
  # Currently using Groq (active)
  provider: groq # Options: groq, openai, anthropic, local
  api_key: ${GROQ_API_KEY} # Or ${LLM_API_KEY}
  model: meta-llama/llama-4-scout-17b-16e-instruct # Llama 4 Scout, 6K TPM, 500K/day
  temperature: 0.2
  max_tokens: 1024 # Reduced to avoid rate limits
  timeout: 90 # seconds (increased for retries)
  retry_delay: 15s # Wait 15 seconds between retries on rate limit
  max_retries: 5 # Retry up to 5 times on rate limit
  base_url: https://api.groq.com/openai/v1 # Groq API endpoint

  # For OpenAI support:
  # provider: openai
  # api_key: ${OPENAI_API_KEY}
  # model: gpt-4-turbo-preview
  # base_url: https://api.openai.com/v1

agents:
  payload:
    enabled: true # ✅ ENABLED - LLM-powered payload generation
    temperature: 0.3
    max_tokens: 2048
    max_retries: 3
    strict_mode: true # Reject hallucinated fields
    generate_negative: true # Generate negative test cases
    generate_boundary: true # Generate boundary test cases

  healing:
    enabled: false # ❌ DISABLED - Not fully implemented yet
    approval_required: true # Always require human approval for fixes
    max_fixes: 10
    confidence_threshold: 0.8 # Min confidence to propose fix (0.0-1.0)

# Knowledge Base & Learning Configuration
knowledge:
  enabled: true # Enable cross-agent intelligence
  storage_path: ./output/knowledge/knowledge_base.json
  auto_save: true
  save_interval: 60s # Auto-save every 60 seconds

  learning:
    enabled: true # Learn from test execution
    min_confidence: 0.7 # Minimum confidence to use learned patterns
    pattern_retention_days: 90 # Keep patterns for 90 days

  collaboration:
    enabled: true # Enable agent collaboration
    consensus_threshold: 0.6 # Minimum consensus confidence
    feedback_buffer_size: 100

  adaptive:
    enabled: true # Enable adaptive testing
    focus_on_failures: true # Generate more tests for failing endpoints
    skip_stable_tests: false # Don't skip stable tests (set true to optimize)
    stability_threshold: 5 # Number of consecutive successes to mark as stable
    failure_focus_multiplier: 2.0 # Multiply test count for failing endpoints
    risk_based_priority: true # Prioritize high-risk endpoints

# Category 1: Payload Generation Enhancements
payload_generation:
  enabled: true

  # Feature 1: Smart Data Generation
  smart_data:
    enabled: true
    use_realistic_data: true
    locale_preference: "en_US"
    apply_relationships: true
    use_historical_patterns: true

  # Feature 2: Mutation-Based Testing
  mutation:
    enabled: true
    enable_field_mutation: true
    enable_type_mutation: true
    enable_boundary_tests: true
    combination_depth: 2
    max_mutations_per_field: 10

  # Feature 3: Security-Focused Testing
  security:
    enabled: true
    enable_sql_injection: true
    enable_xss: true
    enable_command_injection: true
    enable_path_traversal: true
    enable_xml_injection: true
    enable_ldap_injection: true
    enable_auth_bypass: true
    owasp_categories:
      ["A01", "A02", "A03", "A04", "A05", "A06", "A07", "A08", "A09", "A10"]

  # Feature 4: Performance Test Generation
  performance:
    enabled: false # Disabled by default (resource intensive)
    enable_concurrent_requests: true
    enable_load_ramp_up: true
    enable_spike_test: true
    enable_endurance_test: true
    concurrency_levels: [1, 10, 50, 100]
    ramp_up_duration: 5m
    spike_duration: 30s
    endurance_duration: 30m

  # General settings
  max_payloads_per_type: 50
  enable_combinations: true
  use_knowledge_base: true

orchestration:
  workflow:
    state_timeout: 1h
    max_retries: 3
  scheduler:
    worker_pool_size: 10
    job_timeout: 30m
    poll_interval: 5s
  executor:
    default_timeout: 30s
    max_concurrency: 50
    parallel_execution: true

security:
  auth:
    jwt:
      secret: ${JWT_SECRET}
      issuer: auto-regression
      expiration: 24h
    api_key:
      enabled: true
      header_name: X-API-Key
  encryption:
    key: ${ENCRYPTION_KEY}
    algorithm: aes-256-gcm
  rate_limit:
    enabled: true
    requests_per_minute: 100
    burst: 20

observability:
  logging:
    level: info # Options: debug, info, warn, error
    format: json # Options: json, text
    output: stdout
  metrics:
    enabled: true
    prometheus:
      port: 9091
      path: /metrics
  tracing:
    enabled: true
    provider: jaeger
    jaeger:
      endpoint: http://localhost:14268/api/traces
      sampler_type: probabilistic
      sampler_param: 0.1
  health:
    enabled: true
    path: /health
    readiness_path: /ready

notifications:
  slack:
    enabled: false
    webhook_url: ${SLACK_WEBHOOK_URL}
    channel: #auto-regression-alerts
  email:
    enabled: false
    smtp_host: smtp.example.com
    smtp_port: 587
    from: noreply@auto-regression.io
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}

multi_tenancy:
  enabled: true
  default_quota:
    max_tests_per_suite: 1000
    max_executions_per_day: 100
    max_storage_mb: 1024
  isolation_level: strict # Options: strict, relaxed

features:
  ai_analysis: true
  baseline_comparison: true
  parallel_execution: true
  websocket_updates: true
  api_versioning: true

# Vector Database Configuration (PostgreSQL with pgvector)
vector_db:
  enabled: true
  host: localhost
  port: 5432
  database: opentest
  user: opentest
  password: opentest_secret
  ssl_mode: disable
  embedding_model: text-embedding-004
  embedding_dimensions: 768
