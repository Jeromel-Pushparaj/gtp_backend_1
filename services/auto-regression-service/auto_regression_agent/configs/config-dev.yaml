# Development Configuration (Port 8081)
# Use this when port 8080 is already in use

server:
  host: 0.0.0.0
  port: 8081  # Changed from 8080
  grpc_port: 9090
  read_timeout: 30s
  write_timeout: 30s
  shutdown_timeout: 10s
  max_header_bytes: 1048576

database:
  host: localhost
  port: 5432
  name: auto_regression
  user: postgres
  password: ${DB_PASSWORD}
  ssl_mode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m
  log_queries: false

redis:
  host: localhost
  port: 6379
  password: ${REDIS_PASSWORD}
  db: 0
  max_retries: 3
  pool_size: 10
  min_idle_conns: 5

queue:
  type: redis
  redis:
    stream_name: opentest:jobs
    consumer_group: opentest-workers
    max_len: 10000
    block_time: 5s
    claim_interval: 30s
    idle_timeout: 60s
    max_retries: 3

orchestration:
  workflow:
    max_retries: 3
    retry_delay: 5s
    timeout: 30m
  job:
    timeout: 10m
    max_concurrent: 10

llm:
  provider: groq
  api_key: ${GROQ_API_KEY}
  model: openai/gpt-oss-120b
  temperature: 0.2
  max_tokens: 8192
  timeout: 60
  base_url: https://api.groq.com/openai/v1

storage:
  type: local
  local:
    base_path: ./output
    specs_dir: specs
    results_dir: results
    reports_dir: reports

observability:
  logging:
    level: info
    format: json
    output: stdout
  metrics:
    enabled: true
    prometheus:
      port: 9091
      path: /metrics
  tracing:
    enabled: false

vector_db:
  enabled: false
  host: localhost
  port: 5432
  database: opentest
  user: opentest
  password: opentest_secret
  ssl_mode: disable
  embedding_model: all-MiniLM-L6-v2

