  # Frontend web UI
  frontend:
    build:
      context: ./web-ui
      dockerfile: Dockerfile
    container_name: opentest-frontend
    ports:
      - "5173:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api/v1
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - opentest-network
    restart: unless-stopped

volumes:
