version: '3.8'

services:
  # PostgreSQL with pgvector for vector embeddings and learning storage
  postgres:
    image: pgvector/pgvector:pg16
    container_name: opentest-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-opentest}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-opentest_secret}
      - POSTGRES_DB=${POSTGRES_DB:-opentest}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-opentest} -d ${POSTGRES_DB:-opentest}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - opentest-network

  # Redis for job queue and caching
  redis:
    image: redis:7-alpine
    container_name: opentest-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - opentest-network

  # Local Embedding Service (Sentence Transformers)
  embedding-service:
    build:
      context: ./services/embedding-service
      dockerfile: Dockerfile
      args:
        EMBEDDING_MODEL: ${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
    container_name: opentest-embedding-service
    ports:
      - "8000:8000"
    environment:
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - PORT=8000
      - HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - opentest-network
    restart: unless-stopped

  # Backend API server
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: opentest-backend
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      # PostgreSQL with pgvector
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-opentest}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-opentest_secret}
      - POSTGRES_DB=${POSTGRES_DB:-opentest}
    volumes:
      - ./configs:/app/configs
      - ./output:/app/output
      - ./logs:/app/logs
      - ./openAPISample.json:/app/openAPISample.json
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opentest-network
    restart: unless-stopped

  # Autonomous AI Agent System (Primary Workflow Engine)
  # Run all agents in one container (default)
  autonomous-worker:
    build:
      context: .
      dockerfile: Dockerfile.autonomous
    container_name: opentest-autonomous-agents
    command: ["./autonomous-worker", "-agent", "all"]
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Currently using Groq (active)
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_PROVIDER=groq
      - LLM_MODEL=openai/gpt-oss-120b
      - LLM_BASE_URL=https://api.groq.com/openai/v1
      # Embedding service (local sentence transformers)
      - EMBEDDING_PROVIDER=local
      - EMBEDDING_BASE_URL=http://embedding-service:8000
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      # For OpenAI support:
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - LLM_PROVIDER=openai
      # - LLM_MODEL=gpt-4-turbo-preview
      # PostgreSQL with pgvector
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-opentest}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-opentest_secret}
      - POSTGRES_DB=${POSTGRES_DB:-opentest}
    volumes:
      - ./configs:/app/configs
      - ./output:/app/output
      - ./logs:/app/logs
      - ./test_suites:/app/test_suites
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - opentest-network
    restart: unless-stopped

