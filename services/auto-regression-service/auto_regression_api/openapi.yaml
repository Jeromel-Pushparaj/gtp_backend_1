openapi: 3.0.3
info:
  title: Auto-Regression API
  description: |
    API middleware service for automated regression testing of APIs from GitHub repositories.
    
    This service acts as a proxy to the Auto-Regression Agent API, providing a simplified interface
    for testing APIs by fetching OpenAPI specifications from GitHub repositories and executing
    comprehensive test suites using AI-powered autonomous agents.
    
    ## Features
    - Fetch OpenAPI specs from GitHub repositories
    - Execute automated regression tests using AI agents
    - Aggregate and simplify test results
    - Support for multiple branches
    
    ## Workflow
    1. Client sends GitHub repository URL with PAT token
    2. Service fetches OpenAPI spec from the repository
    3. Service forwards request to Agent API (port 8080)
    4. Agent API executes tests using 5 autonomous AI agents
    5. Service aggregates results and returns simplified response
  version: 1.0.0
  contact:
    name: Auto-Regression API Support
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: http://localhost:8092
    description: Local development server
  - url: http://localhost:8092/api/v1
    description: Local development server (with base path)

tags:
  - name: Testing
    description: API regression testing endpoints
  - name: Health
    description: Service health and monitoring

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns the health status of the service
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              example:
                status: healthy
                time: "2024-03-07T10:30:00Z"

  /api/v1/test/aggregate:
    post:
      tags:
        - Testing
      summary: Execute regression tests from GitHub repository
      description: |
        Fetches an OpenAPI specification from a GitHub repository and executes
        comprehensive regression tests using AI-powered autonomous agents.
        
        The service will:
        1. Clone/fetch the repository using the provided PAT token
        2. Locate the OpenAPI specification file
        3. Execute tests using 5 AI agents (Discovery, Designer, Payload, Executor, Analyzer)
        4. Return aggregated test results
        
        **Note:** This operation may take several minutes depending on the API complexity.
      operationId: executeRegressionTests
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestRequest'
            examples:
              basic:
                summary: Basic test request
                value:
                  github_url: "https://github.com/example/api-repo"
                  pat_token: "ghp_xxxxxxxxxxxxxxxxxxxx"
                  branch: "main"
              feature-branch:
                summary: Test feature branch
                value:
                  github_url: "https://github.com/example/api-repo"
                  pat_token: "ghp_xxxxxxxxxxxxxxxxxxxx"
                  branch: "feature/new-endpoint"
      responses:
        '200':
          description: Tests executed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AggregatedResponse'
              example:
                unique_test_cases:
                  - name: "GET /users - Happy Path"
                    status_code: 200
                    passed: true
                    skipped: false
                    category: "happy_path"
                    method: "GET"
                    path: "/api/v1/users"
                  - name: "POST /users - Create User"
                    status_code: 201
                    passed: true
                    skipped: false
                    category: "happy_path"
                    method: "POST"
                    path: "/api/v1/users"
                  - name: "GET /users/{id} - Not Found"
                    status_code: 404
                    passed: true
                    skipped: false
                    category: "error_handling"
                    method: "GET"
                    path: "/api/v1/users/999"
                total_tests: 3
                tests_passed: 3
                tests_failed: 0
                tests_skipped: 0
                pass_rate: 100.0
                executed_at: "2024-03-07T10:35:42Z"
                duration_ns: 5234567890
        '400':
          description: Invalid request
          content:
            text/plain:
              schema:
                type: string
              examples:
                missing-fields:
                  summary: Missing required fields
                  value: "github_url and pat_token are required"
                invalid-json:
                  summary: Invalid JSON body
                  value: "Invalid request body: unexpected end of JSON input"
                test-api-error:
                  summary: Error from test API
                  value: "Test API error: Failed to fetch repository"
        '405':
          description: Method not allowed
          content:
            text/plain:
              schema:
                type: string
              example: "Method not allowed"
        '500':
          description: Internal server error
          content:
            text/plain:
              schema:
                type: string
              examples:
                connection-error:
                  summary: Failed to connect to test API
                  value: "Failed to call test API: connection refused"
                parse-error:
                  summary: Failed to parse response
                  value: "Failed to parse test response: invalid JSON"

components:
  schemas:
    TestRequest:
      type: object
      required:
        - github_url
        - pat_token
      properties:
        github_url:
          type: string
          format: uri
          description: |
            GitHub repository URL containing the OpenAPI specification.
            Supports both HTTPS and SSH formats.
          example: "https://github.com/example/api-repo"
        pat_token:
          type: string
          format: password
          description: |
            GitHub Personal Access Token (PAT) with repository read access.
            Required to clone/fetch private repositories.
            Get your token from: https://github.com/settings/tokens
          example: "ghp_xxxxxxxxxxxxxxxxxxxx"
        branch:
          type: string
          description: |
            Git branch to test. Defaults to the repository's default branch if not specified.
          default: "main"
          example: "main"

    HealthResponse:
      type: object
      required:
        - status
        - time
      properties:
        status:
          type: string
          enum: [healthy]
          description: Health status of the service
          example: "healthy"
        time:
          type: string
          format: date-time
          description: Current server time in RFC3339 format
          example: "2024-03-07T10:30:00Z"

    AggregatedResponse:
      type: object
      required:
        - unique_test_cases
        - total_tests
        - tests_passed
        - tests_failed
        - tests_skipped
        - pass_rate
        - executed_at
        - duration_ns
      properties:
        unique_test_cases:
          type: array
          description: List of all test cases executed
          items:
            $ref: '#/components/schemas/TestCaseResult'
        total_tests:
          type: integer
          description: Total number of tests executed
          example: 15
        tests_passed:
          type: integer
          description: Number of tests that passed
          example: 13
        tests_failed:
          type: integer
          description: Number of tests that failed
          example: 2
        tests_skipped:
          type: integer
          description: Number of tests that were skipped
          example: 0
        pass_rate:
          type: number
          format: double
          description: Percentage of tests that passed (0-100)
          example: 86.67
        executed_at:
          type: string
          format: date-time
          description: Timestamp when tests were executed
          example: "2024-03-07T10:35:42Z"
        duration_ns:
          type: integer
          format: int64
          description: Total execution time in nanoseconds
          example: 5234567890

    TestCaseResult:
      type: object
      required:
        - name
        - status_code
        - passed
        - skipped
        - category
        - method
        - path
      properties:
        name:
          type: string
          description: Human-readable test case name
          example: "GET /users - Happy Path"
        status_code:
          type: integer
          description: HTTP status code returned by the API
          example: 200
        passed:
          type: boolean
          description: Whether the test passed
          example: true
        skipped:
          type: boolean
          description: Whether the test was skipped
          example: false
        category:
          type: string
          description: Test category (e.g., happy_path, error_handling, edge_case)
          enum:
            - happy_path
            - error_handling
            - edge_case
            - boundary
            - security
            - performance
          example: "happy_path"
        method:
          type: string
          description: HTTP method used in the test
          enum:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - HEAD
            - OPTIONS
          example: "GET"
        path:
          type: string
          description: API endpoint path that was tested
          example: "/api/v1/users"

  securitySchemes:
    GitHubPAT:
      type: http
      scheme: bearer
      bearerFormat: GitHub Personal Access Token
      description: |
        GitHub Personal Access Token passed in the request body.
        Required scopes: repo (for private repositories) or public_repo (for public repositories)

security: []

