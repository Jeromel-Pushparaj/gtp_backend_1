openapi: 3.0.3
info:
  title: Score Card Service API
  description: |
    Service for evaluating and scoring software services based on various metrics and rules.
    
    The API provides two versions:
    - **V1**: Simple scorecard creation and retrieval with weighted average scoring
    - **V2**: Advanced rule-based evaluation with level progression (Bronze/Silver/Gold, etc.)
    
    The service evaluates services against predefined scorecards including:
    - Code Quality
    - DORA Metrics
    - Security Maturity
    - Production Readiness
    - Service Health
    - PR Metrics
  version: 1.0.0
  contact:
    name: Score Card Service Team
servers:
  - url: http://localhost:8085
    description: Local development server
  - url: http://localhost:8080/score-card-service
    description: API Gateway

tags:
  - name: Health
    description: Service health check endpoints
  - name: Scorecards V1
    description: Simple scorecard operations with weighted average scoring
  - name: Scorecards V2
    description: Advanced rule-based scorecard evaluation with level progression

paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check
      description: Check if the service is running and healthy
      operationId: healthCheck
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  service:
                    type: string
                    example: score-card-service

  /api/v1/scorecards:
    post:
      tags:
        - Scorecards V1
      summary: Create a new scorecard
      description: |
        Creates a new scorecard by calculating a weighted average score from provided metrics.
        The score is calculated using the following weights:
        - Code Quality: 25%
        - Test Coverage: 25%
        - Security Score: 20%
        - Performance Score: 15%
        - Documentation Score: 15%
      operationId: createScoreCard
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScoreCardRequest'
      responses:
        '201':
          description: Scorecard created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreCardResponse'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/scorecards/{id}:
    get:
      tags:
        - Scorecards V1
      summary: Get scorecard by ID
      description: Retrieves a specific scorecard by its ID
      operationId: getScoreCard
      parameters:
        - name: id
          in: path
          required: true
          description: Scorecard ID
          schema:
            type: integer
            format: int64
            example: 1
      responses:
        '200':
          description: Scorecard found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreCardResponse'
        '400':
          description: Invalid scorecard ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Scorecard not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/scorecards/service/{name}:
    get:
      tags:
        - Scorecards V1
      summary: Get all scorecards for a service
      description: Retrieves all scorecards associated with a specific service name
      operationId: getScoreCardsByService
      parameters:
        - name: name
          in: path
          required: true
          description: Service name
          schema:
            type: string
            example: authentication-service
      responses:
        '200':
          description: Scorecards retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  service:
                    type: string
                    example: authentication-service
                  count:
                    type: integer
                    example: 5
                  scorecards:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScoreCardResponse'
        '400':
          description: Service name is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v1/scorecards/service/{name}/latest:
    get:
      tags:
        - Scorecards V1
      summary: Get latest scorecard for a service
      description: Retrieves the most recent scorecard for a specific service
      operationId: getLatestScoreCard
      parameters:
        - name: name
          in: path
          required: true
          description: Service name
          schema:
            type: string
            example: authentication-service
      responses:
        '200':
          description: Latest scorecard retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScoreCardResponse'
        '400':
          description: Service name is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No scorecard found for service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/scorecards/definitions:
    get:
      tags:
        - Scorecards V2
      summary: Get all scorecard definitions
      description: |
        Retrieves all available scorecard definitions with their levels and rules.
        Includes Code Quality, DORA Metrics, Security Maturity, Production Readiness, Service Health, and PR Metrics.
      operationId: getAllScorecardDefinitions
      responses:
        '200':
          description: Scorecard definitions retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  count:
                    type: integer
                    example: 6
                  scorecards:
                    type: array
                    items:
                      $ref: '#/components/schemas/ScorecardDefinition'

  /api/v2/scorecards/definitions/{name}:
    get:
      tags:
        - Scorecards V2
      summary: Get specific scorecard definition
      description: Retrieves a specific scorecard definition by name
      operationId: getScorecardDefinition
      parameters:
        - name: name
          in: path
          required: true
          description: Scorecard name
          schema:
            type: string
            enum:
              - CodeQuality
              - DORA_Metrics
              - Security_Maturity
              - Production_Readiness
              - Service_Health
              - PR_Metrics
            example: CodeQuality
      responses:
        '200':
          description: Scorecard definition found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScorecardDefinition'
        '404':
          description: Scorecard definition not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/scorecards/evaluate:
    post:
      tags:
        - Scorecards V2
      summary: Evaluate service against all scorecards
      description: |
        Evaluates a service against all active scorecard definitions and returns overall score,
        achieved levels, rule results, strengths, and improvement areas.
      operationId: evaluateService
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateServiceRequest'
      responses:
        '200':
          description: Service evaluated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceOverallScore'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to evaluate service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/v2/scorecards/evaluate/{name}:
    post:
      tags:
        - Scorecards V2
      summary: Evaluate service against specific scorecard
      description: Evaluates a service against a specific scorecard definition
      operationId: evaluateServiceByScorecardName
      parameters:
        - name: name
          in: path
          required: true
          description: Scorecard name
          schema:
            type: string
            enum:
              - CodeQuality
              - DORA_Metrics
              - Security_Maturity
              - Production_Readiness
              - Service_Health
              - PR_Metrics
            example: CodeQuality
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EvaluateServiceRequest'
      responses:
        '200':
          description: Service evaluated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScorecardEvaluation'
        '400':
          description: Invalid request body
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Scorecard definition not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Failed to evaluate service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          example: Invalid request body
        details:
          type: string
          example: service_name is required

    Metrics:
      type: object
      required:
        - code_quality
        - test_coverage
        - security_score
        - performance_score
        - documentation_score
      properties:
        code_quality:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Code quality score (0-100)
          example: 85.5
        test_coverage:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Test coverage percentage (0-100)
          example: 90.0
        security_score:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Security score (0-100)
          example: 88.0
        performance_score:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Performance score (0-100)
          example: 92.0
        documentation_score:
          type: number
          format: double
          minimum: 0
          maximum: 100
          description: Documentation score (0-100)
          example: 75.0

    ScoreCardRequest:
      type: object
      required:
        - service_name
        - metrics
      properties:
        service_name:
          type: string
          description: Name of the service being evaluated
          example: authentication-service
        metrics:
          $ref: '#/components/schemas/Metrics'

    ScoreCardResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the scorecard
          example: 1
        service_name:
          type: string
          description: Name of the service
          example: authentication-service
        score:
          type: number
          format: double
          description: Overall weighted average score (0-100)
          example: 86.25
        grade:
          type: string
          description: Letter grade based on score (A, B, C, D, F)
          enum: [A, B, C, D, F]
          example: B
        metrics:
          $ref: '#/components/schemas/Metrics'
        created_at:
          type: string
          format: date-time
          description: Timestamp when the scorecard was created
          example: 2024-01-15T10:30:00Z

    EvaluateServiceRequest:
      type: object
      required:
        - service_name
        - service_data
      properties:
        service_name:
          type: string
          description: Name of the service being evaluated
          example: authentication-service
        service_data:
          type: object
          description: Service metrics data as key-value pairs
          additionalProperties: true
          example:
            coverage: 85.5
            code_smells: 12
            vulnerabilities: 2
            duplicated_lines_density: 3.2
            has_readme: 1
            deployment_frequency: 5
            mttr: 8

    Rule:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        level_id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          description: Rule name
          example: Coverage >= 60%
        description:
          type: string
          description: Rule description
          example: Test coverage at least 60%
        property:
          type: string
          description: Metric property to evaluate
          example: coverage
        operator:
          type: string
          description: Comparison operator
          enum: ['>=', '<=', '==', '!=', '>', '<']
          example: '>='
        threshold:
          type: number
          format: double
          description: Threshold value for comparison
          example: 60
        rule_type:
          type: string
          description: Type of rule
          enum: [property, relation, scorecard]
          example: property
        weight:
          type: number
          format: double
          description: Optional weight for scoring
          example: 1.0

    RuleResult:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        evaluation_id:
          type: integer
          format: int64
          example: 1
        rule_id:
          type: integer
          format: int64
          example: 1
        rule_name:
          type: string
          example: Coverage >= 60%
        passed:
          type: boolean
          description: Whether the rule passed
          example: true
        actual_value:
          type: number
          format: double
          description: Actual metric value
          example: 85.5
        expected_value:
          type: number
          format: double
          description: Expected threshold value
          example: 60
        operator:
          type: string
          description: Comparison operator used
          example: '>='
        message:
          type: string
          description: Human-readable evaluation message
          example: Passed
        evaluated_at:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00Z

    Level:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        scorecard_id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          description: Level name
          example: Bronze
        display_name:
          type: string
          description: Display name with icon
          example: Bronze
        order_index:
          type: integer
          description: Level order (1=lowest, higher=better)
          example: 1
        color:
          type: string
          description: Hex color for UI
          example: '#CD7F32'
        icon:
          type: string
          description: Icon or emoji
          example: Bronze
        description:
          type: string
          description: Level description
          example: Basic level of code quality
        rules:
          type: array
          description: Rules required to achieve this level
          items:
            $ref: '#/components/schemas/Rule'

    ScorecardDefinition:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          description: Scorecard identifier name
          example: CodeQuality
        display_name:
          type: string
          description: Human-readable display name
          example: Code Quality
        category:
          type: string
          description: Scorecard category
          enum:
            - code_quality
            - security
            - reliability
            - development_velocity
            - production_readiness
            - service_health
          example: code_quality
        description:
          type: string
          description: Scorecard description
          example: Evaluates code quality based on test coverage, vulnerabilities, code smells, and duplications
        level_pattern:
          type: string
          description: Level naming pattern
          enum:
            - metal
            - performance
            - traffic_light
            - descriptive
          example: metal
        levels:
          type: array
          description: Levels with their rules
          items:
            $ref: '#/components/schemas/Level'
        is_active:
          type: boolean
          description: Whether the scorecard is active
          example: true
        created_at:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00Z
        updated_at:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00Z

    ScorecardEvaluation:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        service_name:
          type: string
          description: Name of the evaluated service
          example: authentication-service
        scorecard_id:
          type: integer
          format: int64
          description: ID of the scorecard definition
          example: 1
        scorecard_name:
          type: string
          description: Name of the scorecard
          example: Code Quality
        achieved_level_id:
          type: integer
          format: int64
          nullable: true
          description: ID of the achieved level
          example: 2
        achieved_level_name:
          type: string
          description: Name of the achieved level or 'None'
          example: Silver
        rules_passed:
          type: integer
          description: Number of rules that passed
          example: 8
        rules_total:
          type: integer
          description: Total number of rules evaluated
          example: 10
        pass_percentage:
          type: number
          format: double
          description: Percentage of rules passed
          example: 80.0
        rule_results:
          type: array
          description: Detailed results for each rule
          items:
            $ref: '#/components/schemas/RuleResult'
        evaluated_at:
          type: string
          format: date-time
          example: 2024-01-15T10:30:00Z

    ServiceOverallScore:
      type: object
      properties:
        service_name:
          type: string
          description: Name of the evaluated service
          example: authentication-service
        overall_percentage:
          type: number
          format: double
          description: Overall percentage of rules passed across all scorecards
          example: 75.5
        total_rules_passed:
          type: integer
          description: Total number of rules passed across all scorecards
          example: 45
        total_rules:
          type: integer
          description: Total number of rules evaluated across all scorecards
          example: 60
        scorecards:
          type: array
          description: Evaluation results for each scorecard
          items:
            $ref: '#/components/schemas/ScorecardEvaluation'
        strengths:
          type: array
          description: Areas where the service is performing well
          items:
            type: string
          example:
            - 'Code Quality: Silver'
            - 'Security Maturity: Good'
        improvement_areas:
          type: array
          description: Areas that need improvement
          items:
            type: string
          example:
            - 'DORA Metrics: Needs attention'
            - 'Production Readiness: Needs attention'
        evaluated_at:
          type: string
          format: date-time
          description: Timestamp when the evaluation was performed
          example: 2024-01-15T10:30:00Z

